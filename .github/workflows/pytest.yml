name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the dependencies from pyproject.toml
        # We install pip directly to ensure it works even if pyproject.toml lacks a build backend
        pip install crewai crewai-tools sqlalchemy psycopg2-binary python-dotenv resend pytest pytest-mock
        
    - name: Run pytest
      run: |
        pytest tests/ -v
