<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueMountain Lead Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="glow-orb"></div>
    <div class="glow-orb secondary"></div>
    
    <header class="glass-header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>
            <span>BlueMountain</span>
        </div>
        <div class="actions">
            <button id="runCrewBtn" class="btn primary glow">
                <span class="btn-text">Run AI Crew</span>
                <span class="loader hidden"></span>
            </button>
        </div>
    </header>

    <main class="container">
        <section class="dashboard">
            <div class="header-row">
                <h2>Drafted Leads</h2>
                <span class="badge" id="leadCount">0</span>
            </div>
            
            <div id="leadsGrid" class="leads-grid">
                <!-- Leads will be injected here via JS -->
            </div>
        </section>
    </main>

    <!-- Dispatch Modal -->
    <div id="dispatchModal" class="modal hidden">
        <div class="modal-content glass-card">
            <h3>Dispatch Email</h3>
            <p>Send the drafted email to <span id="modalBusinessName" class="highlight"></span></p>
            <form id="dispatchForm">
                <input type="hidden" id="modalLeadId">
                <div class="form-group">
                    <label for="contactEmail">Recipient Email Address</label>
                    <input type="email" id="contactEmail" required placeholder="contact@business.com">
                </div>
                <div class="form-actions">
                    <button type="button" id="closeModalBtn" class="btn secondary">Cancel</button>
                    <button type="submit" class="btn primary">Send Now</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
